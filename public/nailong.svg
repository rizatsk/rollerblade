<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120">
  <!-- Yellow body/head -->
  <ellipse cx="50" cy="55" rx="35" ry="32" fill="#FFEB3B" stroke="#F57F17" stroke-width="2.5"/>
  
  <!-- Cheeks -->
  <circle cx="28" cy="62" r="6" fill="#FF8A80" opacity="0.8"/>
  <circle cx="72" cy="62" r="6" fill="#FF8A80" opacity="0.8"/>

  <!-- Belly (lighter yellow) -->
  <ellipse cx="50" cy="68" rx="20" ry="15" fill="#FFF9C4" />

  <!-- Big Cute Eyes -->
  <circle cx="36" cy="48" r="8" fill="#212121"/>
  <circle cx="64" cy="48" r="8" fill="#212121"/>
  <!-- Highlights -->
  <circle cx="34" cy="45" r="3" fill="#FFFFFF"/>
  <circle cx="38" cy="51" r="1" fill="#FFFFFF"/>
  <circle cx="62" cy="45" r="3" fill="#FFFFFF"/>
  <circle cx="66" cy="51" r="1" fill="#FFFFFF"/>

  <!-- Snout/Nose area -->
  <ellipse cx="50" cy="58" rx="10" ry="6" fill="#FFF59D" stroke="#F57F17" stroke-width="1.5"/>
  <circle cx="47" cy="57" r="1" fill="#E65100"/>
  <circle cx="53" cy="57" r="1" fill="#E65100"/>

  <!-- Happy Smile -->
  <path d="M 45 61 Q 50 66 55 61" fill="none" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>

  <!-- Horns (Cute Little Dragon Horns) -->
  <path d="M 28 26 C 26 16, 36 14, 36 24" fill="#FFB74D" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <path d="M 72 26 C 74 16, 64 14, 64 24" fill="#FFB74D" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>

  <!-- Cute little green leaf on head (Nailong style) -->
  <path d="M 50 25 C 47 15, 53 10, 50 5 C 53 10, 53 15, 50 25" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M 50 25 C 53 15, 47 10, 50 5 C 47 10, 47 15, 50 25" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Small wings -->
  <path d="M 15 50 C 5 45, 5 60, 15 58 Z" fill="#FFEB3B" stroke="#F57F17" stroke-width="1.5"/>
  <path d="M 85 50 C 95 45, 95 60, 85 58 Z" fill="#FFEB3B" stroke="#F57F17" stroke-width="1.5"/>

  <!-- Strawberry icon on belly -->
  <path d="M 50 65 C 47 65, 46 68, 50 72 C 54 68, 53 65, 50 65 Z" fill="#E53935"/>
  <!-- Strawberry leaf -->
  <path d="M 48 65 Q 50 63 52 65" fill="none" stroke="#4CAF50" stroke-width="1"/>
</svg>
